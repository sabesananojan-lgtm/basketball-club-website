<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="page-wrap">
        <nav class="topbar">
            <div class="brand">
                <span class="brand-mark">J</span>
                Jaffna Basketball Club
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="players.html">Players</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>

        <main class="section contact-page">
            <h1>Contact The Coach</h1>
            <form class="contact-form" onsubmit="return handleContact(event)">
                <label>Name</label>
                <input type="text" id="name" placeholder="Your name">
                <label>Email</label>
                <input type="email" id="email" placeholder="Your email">
                <label>Message</label>
                <textarea id="message" placeholder="Tell us about your interest"></textarea>
                <button class="btn btn-primary" type="submit">Send Message</button>
            </form>
        </main>

        <footer class="footer">
            <p>Jaffna Basketball Club</p>
            <p>Reach out and start your basketball journey.</p>
        </footer>
    </div>
</body>
</html>
